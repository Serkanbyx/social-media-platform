# Render Blueprint — declarative spec for the Express + Socket.io API.
# Import via Render dashboard: New → Blueprint → pick this repo.
# Secret values (sync: false) MUST be filled manually in the Render dashboard
# after the service is created. NEVER commit real secrets to this file.

services:
  - type: web
    name: social-platform-api
    runtime: node
    plan: free
    region: frankfurt
    rootDir: server
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
